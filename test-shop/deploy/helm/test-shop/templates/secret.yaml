{{- $secretName := printf "%s-database" (include "test-shop.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := .Values.postgres.password -}}
{{- if and (empty $password) $existingSecret -}}
{{- $password = (index $existingSecret.data "password" | b64dec) -}}
{{- end -}}
{{- if empty $password -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "test-shop.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.postgres.username | quote }}
  password: {{ $password | quote }}
  database: {{ .Values.postgres.database | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s" .Values.postgres.username $password (include "test-shop.fullname" .) .Values.postgres.database | quote }}
