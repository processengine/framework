name: processengine-test-shop

x-app-environment: &app-environment
  DATABASE_URL: postgresql://processengine:processengine@postgres:5432/processengine
  KAFKA_BROKERS: kafka:9092
  COMPLETION_TOPIC: shop.operation.completions.v1
  DEBUG_API_ENABLED: "true"
  DEMO_FAULTS_ENABLED: "true"
  STARTUP_TIMEOUT_MS: "120000"

x-app-security: &app-security
  read_only: true
  tmpfs: ["/tmp:rw,noexec,nosuid,size=32m"]
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  init: true

services:
  postgres:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_USER: processengine
      POSTGRES_PASSWORD: processengine
      POSTGRES_DB: processengine
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U processengine -d processengine"]
      interval: 2s
      timeout: 3s
      retries: 60
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.3.1
    hostname: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes: ["kafka-data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 3s
      timeout: 10s
      retries: 60
      start_period: 10s
    restart: unless-stopped

  topics:
    image: apache/kafka:4.3.1
    depends_on: { kafka: { condition: service_healthy } }
    entrypoint: ["/bin/bash", "-euc"]
    command:
      - |
        for topic in shop.warehouse.commands.v1 shop.payment.commands.v1 shop.operation.completions.v1; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
            --topic "$${topic}" --partitions 3 --replication-factor 1
        done
    restart: "no"

  migrations:
    image: processengine/test-shop-shop-host:${TEST_SHOP_IMAGE_TAG:-dev}
    build: { context: .., dockerfile: Dockerfile, target: shop-host }
    environment: { <<: *app-environment }
    depends_on: { postgres: { condition: service_healthy } }
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - node apps/shop-host/dist/migrate.js && node apps/shop-warehouse/dist/migrate.js && node apps/shop-payment/dist/migrate.js
    restart: "no"

  shop-host:
    image: processengine/test-shop-shop-host:${TEST_SHOP_IMAGE_TAG:-dev}
    build: { context: .., dockerfile: Dockerfile, target: shop-host }
    <<: *app-security
    environment:
      <<: *app-environment
      PORT: "3000"
      KAFKA_CLIENT_ID: test-shop-shop-host-compose
      KAFKA_CONSUMER_GROUP: test-shop-shop-host-v1
      FLOW_FILES: /app/test-shop/flows/shop.checkout.v1.json,/app/test-shop/flows/shop.checkout.v2.json
      OPERATIONS_FILE: /app/test-shop/config/operations.json
    ports: ["127.0.0.1::3000"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      topics: { condition: service_completed_successfully }
      migrations: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 60
    restart: unless-stopped

  shop-warehouse:
    image: processengine/test-shop-shop-warehouse:${TEST_SHOP_IMAGE_TAG:-dev}
    build: { context: .., dockerfile: Dockerfile, target: shop-warehouse }
    <<: *app-security
    environment:
      <<: *app-environment
      PORT: "8081"
      KAFKA_CLIENT_ID: test-shop-shop-warehouse-compose
      KAFKA_CONSUMER_GROUP: test-shop-shop-warehouse-v1
      COMMAND_TOPIC: shop.warehouse.commands.v1
    ports: ["127.0.0.1::8081"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      topics: { condition: service_completed_successfully }
      migrations: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8081/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 60
    restart: unless-stopped

  shop-payment:
    image: processengine/test-shop-shop-payment:${TEST_SHOP_IMAGE_TAG:-dev}
    build: { context: .., dockerfile: Dockerfile, target: shop-payment }
    <<: *app-security
    environment:
      <<: *app-environment
      PORT: "8082"
      KAFKA_CLIENT_ID: test-shop-shop-payment-compose
      KAFKA_CONSUMER_GROUP: test-shop-shop-payment-v1
      COMMAND_TOPIC: shop.payment.commands.v1
      DELAYED_RESPONSE_MS: "15000"
    ports: ["127.0.0.1::8082"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      topics: { condition: service_completed_successfully }
      migrations: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8082/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 60
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:
